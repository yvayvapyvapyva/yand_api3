<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Навигатор - Маршрут</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://api-maps.yandex.ru/v3/?apikey=c0e28937-4e16-4d15-9b99-09a30cb8fc13&lang=ru_RU" type="text/javascript"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
    <script src="https://unpkg.com/@vkontakte/vk-bridge@latest/dist/browser.min.js"></script>
    <link rel="stylesheet" href="assets/css/menu-module.css">
    <!-- Список маршрутов -->
    <script src="assets/js/routes-list.js"></script>
    <script src="assets/js/menu-module.js"></script>
    <style>
    :root {
        --bg: #050505;
        --dark-panel: linear-gradient(180deg, rgba(20,20,20,0.85), rgba(10,10,10,0.8));
        --btn-txt: #ffffff;
        --border: rgba(255,255,255,0.25);
        --panel-blur: blur(22px);
        --target-lime: #00FF00;
    }
    html, body {
        margin: 0; padding: 0; height: 100%; width: 100%;
        font-family: -apple-system, sans-serif; overflow: hidden;
        background: var(--bg); position: fixed; touch-action: none;
        color: var(--btn-txt);
    }
    #map { position: absolute; inset: 0; z-index: 1; }
    [class*="-copyrights-pane"], [class*="-map-copyrights-promo"], [class*="-controls-pane"] { display: none !important; }

    /* Загрузочный экран */
    .loading-overlay {
        position: fixed; inset: 0; background: rgba(8,10,14,0.95);
        z-index: 9999; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        color: white; font-weight: 600; text-align: center;
        padding: 20px; backdrop-filter: blur(10px);
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; transition: opacity 0.5s; }

    /* Wake Lock видео - невидимое */
    #wakeLockVideo {
        position: fixed;
        width: 1px;
        height: 1px;
        opacity: 0.001;
        pointer-events: none;
        z-index: -9999;
    }

    /* Общие стили кнопок */
    .circle-btn {
        position: absolute; z-index: 9005;
        background: var(--dark-panel);
        backdrop-filter: var(--panel-blur);
        -webkit-backdrop-filter: var(--panel-blur);
        width: 56px; height: 56px; border-radius: 50%;
        border: 1px solid var(--border);
        color: var(--btn-txt);
        cursor: pointer;
        transition: transform 0.15s, background 0.15s;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.22);
    }
    .circle-btn svg { fill: currentColor; width: 24px; height: 24px; }
    .circle-btn:active { transform: scale(0.95); background: rgba(30,32,40,0.9); }
    .circle-btn.active { background: rgba(52,199,89,0.42); border-color: rgba(103,255,153,0.45); }
    #listBtn { top: calc(16px + env(safe-area-inset-top)); left: 16px; }
    #locateBtn { top: calc(16px + env(safe-area-inset-top)); right: 16px; }

    /* Телеметрия */
    #telemetryPanel {
        position: absolute;
        top: calc(16px + env(safe-area-inset-top) + 66px); right: 16px;
        z-index: 9005;
        background: var(--dark-panel);
        backdrop-filter: var(--panel-blur);
        -webkit-backdrop-filter: var(--panel-blur);
        border-radius: 50%;
        border: 1px solid var(--border);
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(0,0,0,0.22);
        transition: transform 0.15s, background 0.15s;
        width: 56px; height: 56px;
        box-sizing: border-box;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        padding: 8px;
    }
    #telemetryPanel.visible { display: flex; }
    #telemetryPanel:active { transform: scale(0.95); }
    .tel-item { display: flex; flex-direction: column; align-items: center; }
    .tel-label { font-size: 8px; color: #aaa; font-weight: 700; text-transform: uppercase; }
    .tel-value { font-size: 13px; font-weight: 800; text-align: center; }
    .tel-divider { height: 1px; width: 100%; background: rgba(255,255,255,0.15); margin: 4px 0; display: none; }

    /* HUD */
    #hud {
        position: absolute;
        bottom: calc(24px + env(safe-area-inset-bottom));
        left: 16px; right: 16px; z-index: 9000;
        background: var(--dark-panel);
        backdrop-filter: var(--panel-blur);
        -webkit-backdrop-filter: var(--panel-blur);
        border-radius: 20px; padding: 16px; color: var(--btn-txt);
        border: 1px solid var(--border);
        box-shadow: 0 12px 24px rgba(0,0,0,0.22);
        display: none; flex-direction: column; gap: 8px;
        pointer-events: auto;
        width: calc(100% - 32px); box-sizing: border-box;
    }
    #hud.active { display: flex; }
    .hud-header { display: flex; align-items: center; gap: 10px; }
    .hud-index {
        background: rgba(255,255,255,0.2); color: white;
        font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 6px;
    }
    .hud-cmd { font-size: 16px; font-weight: 700; flex: 1; }
    .hud-header .action-icon-btn {
        width: 40px; height: 40px; border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(255,255,255,0.12);
        border: 1px solid var(--border);
        cursor: pointer; flex-shrink: 0;
    }
    .hud-header .action-icon-btn svg { fill: #f3f4f6; width: 20px; height: 20px; }
    .hud-header .action-icon-btn:active { transform: scale(0.95); }
    .hud-actions {
        width: 100%; display: flex; padding-top: 8px; gap: 8px;
        align-items: center; border-top: 1px solid rgba(255,255,255,0.1);
    }
    .hud-stats { display: flex; flex-direction: row; align-items: center; gap: 8px; }
    .hud-stats .stat-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .stat-value { font-size: 14px; font-weight: 800; line-height: 1; }
    .stat-value.in-range { color: var(--target-lime); }
    .stat-label-unit { font-size: 10px; color: #888; font-weight: 700; }

    /* Компас в HUD панели */
    .hud-stats .azimuth-compass {
        width: 32px; height: 32px; border-radius: 50%;
        background: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.3);
        position: relative; display: flex; align-items: center; justify-content: center;
        transition: background 0.3s, border-color 0.3s;
        flex-shrink: 0;
    }
    .hud-stats .azimuth-compass.in-range {
        background: rgba(0,255,0,0.15); border-color: var(--target-lime);
    }
    .hud-stats .compass-arrow {
        width: 2px; height: 26px;
        margin-top: -13px;
    }
    .hud-stats .compass-arrow::before {
        height: 20px;
    }
    .hud-stats .compass-arrow::after {
        border-left: 3px solid transparent;
        border-right: 3px solid transparent;
        border-bottom: 5px solid currentColor;
        top: -4px;
    }
    .hud-stats .compass-center {
        width: 5px; height: 5px;
    }

    /* Базовые стили компаса */
    .compass-arrow {
        position: absolute; width: 2px; height: 26px;
        transform-origin: center center; top: 50%;
        margin-top: -13px; border-radius: 2px; transition: transform 0.3s ease-out;
        display: flex; flex-direction: column; align-items: center;
    }
    .compass-arrow::after {
        content: '';
        width: 0; height: 0;
        border-left: 3px solid transparent;
        border-right: 3px solid transparent;
        border-bottom: 5px solid currentColor;
        position: absolute; top: -4px;
    }
    .compass-arrow::before {
        content: '';
        width: 2px; height: 20px;
        border-radius: 2px;
    }
    .compass-arrow-user {
        color: #FF3B30;
        z-index: 2;
    }
    .compass-arrow-user::before {
        background: linear-gradient(to top, #FF3B30, #FF6B6B);
    }
    .compass-arrow-target {
        color: #007AFF;
        z-index: 1; opacity: 0.8;
    }
    .compass-arrow-target::before {
        background: linear-gradient(to top, #007AFF, #5AC8FA);
    }
    .compass-center {
        width: 5px; height: 5px; border-radius: 50%;
        background: rgba(255,255,255,0.5); z-index: 3;
    }
    .action-icon-btn {
        width: 36px; height: 36px; border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(255,255,255,0.12);
        border: 1px solid var(--border);
        cursor: pointer; flex-shrink: 0;
    }
    .action-icon-btn svg { fill: #f3f4f6; width: 20px; height: 20px; }
    #selectBtn {
        padding: 10px 16px; border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(52,199,89,0.42);
        border-color: rgba(103,255,153,0.45);
        color: #fff; font-size: 14px; font-weight: 700;
        cursor: pointer;
        transition: transform 0.15s, background 0.15s;
    }
    #selectBtn:active { transform: scale(0.95); }
    .nav-arrow-btn {
        width: 40px; height: 40px; border-radius: 10px;
        background: rgba(255,255,255,0.2);
        border: 1px solid rgba(255,255,255,0.4);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; flex-shrink: 0;
        transition: background 0.15s, transform 0.15s;
    }
    .nav-arrow-btn svg { fill: #ffffff; width: 24px; height: 24px; filter: drop-shadow(0 0 2px rgba(0,0,0,0.8)); }
    .nav-arrow-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.3); }
    .nav-arrow-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Список точек */
    #pointsList {
        position: absolute;
        top: calc(16px + env(safe-area-inset-top) + 66px);
        bottom: calc(24px + env(safe-area-inset-bottom) + 150px);
        left: 16px;
        width: calc(100% - 32px);
        background: var(--dark-panel);
        backdrop-filter: var(--panel-blur);
        -webkit-backdrop-filter: var(--panel-blur);
        border-radius: 14px; border: 1px solid var(--border);
        z-index: 9700; box-shadow: 0 20px 40px rgba(0,0,0,0.35);
        pointer-events: auto;
        display: none; flex-direction: column; overflow: hidden;
    }
    #pointsList .header {
        padding: 12px 16px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        font-weight: 800; font-size: 11px; text-align: center;
        color: rgba(255,255,255,0.5); text-transform: uppercase;
    }
    #pointsListContent {
        overflow-y: auto; padding: 8px;
        display: flex; flex-direction: column; gap: 6px;
    }
    .point-item {
        display: flex; align-items: flex-start; gap: 10px;
        padding: 12px; border-radius: 16px; color: white;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        cursor: pointer;
    }
    .point-item:active { background: rgba(255,255,255,0.08); }
    .point-item.active { background: rgba(255,255,255,0.14); }
    .point-badge {
        min-width: 24px; height: 24px; border-radius: 8px;
        background: rgba(255,255,255,0.1);
        font-size: 11px; font-weight: 800;
        display: flex; align-items: center; justify-content: center;
        margin-top: 4px;
    }
    .active .point-badge { background: rgba(255,255,255,0.24); color: #fff; }
    .point-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .point-name {
        font-size: 15px; font-weight: 600; line-height: 1.3;
        color: #fff; word-wrap: break-word;
    }

    /* Комментарий */
    #commentBlock {
        display: none; margin-bottom: 10px; padding: 10px;
        background: rgba(255,149,0,0.15);
        border-radius: 10px; border: 1px solid rgba(255,149,0,0.4);
    }
    #commentBlock.visible { display: block; }
    #commentText { font-size: 12px; line-height: 1.5; color: #e5e7eb; white-space: pre-wrap; }
    #closeCommentBtn {
        width: 20px; height: 20px; border-radius: 6px;
        background: rgba(255,149,0,0.3);
        border: 1px solid rgba(255,149,0,0.5);
        color: #fff; display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-size: 14px; line-height: 1; flex-shrink: 0;
    }

    /* Toast */
    #toast {
        position: fixed;
        top: calc(80px + env(safe-area-inset-top)); left: 50%;
        transform: translateX(-50%) translateY(-100px);
        background: var(--dark-panel); color: #ffffff;
        padding: 14px 24px; border-radius: 16px;
        font-size: 14px; z-index: 9999;
        transition: 0.4s; opacity: 0;
        backdrop-filter: var(--panel-blur);
        -webkit-backdrop-filter: var(--panel-blur);
        border: 1px solid var(--border); font-weight: 700;
        max-width: 80vw; white-space: pre-wrap;
        text-align: center; line-height: 1.4; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.success { background: rgba(52,199,89,0.95); }
    #toast.error { background: rgba(255,59,48,0.95); }
    #toast.info { background: rgba(0,0,0,0.82); }

    /* Wake lock */
    #v { position: fixed; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
    </style>
</head>

<script data-plugins="transform-modules-umd" data-presets="typescript" type="text/babel">
// ============================================
// КОНФИГУРАЦИЯ
// ============================================
const COLORS = {
    Gold: { hex: '#FFD700' }, Blue: { hex: '#007AFF' }, Red: { hex: '#FF3B30' },
    Fuchsia: { hex: '#AF52DE' }, Orange: { hex: '#FF9500' }, Purple: { hex: '#5856D6' },
    Cyan: { hex: '#5AC8FA' }, Brown: { hex: '#A2845E' }, Lime: { hex: '#34C759' }
};

const APP = {
    map: null,
    userMarker: null,
    userMarkerEl: null,
    lastPos: null,
    lastAz: 0,
    autoCenter: false,
    currentSpeed: 0,
    navPoints: [],
    navCurrentIndex: 0,
    navPreviewIndex: -1,
    navAudio: new Audio(),
    navConfig: { TRIGGER_DIST: 25, AZ_TOLERANCE: 45, SPEED_THRESHOLD: 2 }
};

const $ = id => document.getElementById(id);

// ============================================
// VK MINI APPS
// ============================================
if (typeof vkBridge !== 'undefined') {
    vkBridge.send('VKWebAppInit');
}

// ============================================
// УВЕДОМЛЕНИЯ
// ============================================
let toastTimer = null;

function showToast(text, type = 'info', duration = 2000) {
    const el = $('toast');
    el.textContent = text;
    el.className = `toast ${type} show`;

    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// ============================================
// ГЕОЛОКАЦИЯ
// ============================================
function getUserLocSvg(azimuth = 0) {
    return 'data:image/svg+xml;utf8,' + encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
            <g transform="rotate(${azimuth}, 20, 20)">
                <path d="M20,4 L32,34 L20,28 L8,34 Z" fill="#FF3B30" stroke="white" stroke-width="2"/>
            </g>
        </svg>`
    );
}

function calcAzimuth(p1, p2) {
    if (!p1 || !p2) return 0;
    // p1 и p2 в формате [lat, lon] для расчёта азимута (старый формат)
    const [la1, lo1] = p1.map(v => v * Math.PI / 180);
    const [la2, lo2] = p2.map(v => v * Math.PI / 180);
    const y = Math.sin(lo2 - lo1) * Math.cos(la2);
    const x = Math.cos(la1) * Math.sin(la2) - Math.sin(la1) * Math.cos(la2) * Math.cos(lo2 - lo1);
    return Math.round((Math.atan2(y, x) * 180 / Math.PI + 360) % 360);
}

function calcDistance(p1, p2) {
    if (!p1 || !p2) return 0;
    const R = 6371000;
    // p1 и p2 в формате [lng, lat] для API v3
    const [lng1, lat1] = p1.map(v => v * Math.PI / 180);
    const [lng2, lat2] = p2.map(v => v * Math.PI / 180);
    const dLat = lat2 - lat1;
    const dLon = lng2 - lng1;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1) * Math.cos(lat2) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

function initGeolocation() {
    if (navigator.geolocation) {
        console.log('[Geo] Запрос геолокации...');
        
        navigator.geolocation.watchPosition(
            (pos) => {
                // В API v3 координаты: [долгота, широта] (lng, lat)
                const coords = [pos.coords.longitude, pos.coords.latitude];
                const speed = (pos.coords.speed || 0) * 3.6;
                
                // Логирование позиции
                console.log('[Geo] Позиция:', {
                    lat: coords[1],
                    lon: coords[0],
                    accuracy: pos.coords.accuracy,
                    speed: speed.toFixed(1) + ' км/ч',
                    heading: pos.coords.heading
                });
                
                if (APP.lastPos && speed >= APP.navConfig.SPEED_THRESHOLD)
                    // APP.lastPos и coords в формате [lng, lat], а calcAzimuth ожидает [lat, lon]
                    APP.lastAz = calcAzimuth([APP.lastPos[1], APP.lastPos[0]], [coords[1], coords[0]]);
                APP.lastPos = coords;
                APP.currentSpeed = speed;

                if (APP.userMarker && APP.userMarkerEl) {
                    console.log('[Marker] Обновляю позицию:', coords);
                    // Обновляем координаты
                    APP.userMarker.update({
                        coordinates: coords
                    });
                    // Поворачиваем стрелку по азимуту
                    const arrowEl = APP.userMarkerEl.querySelector('#user-arrow');
                    if (arrowEl) {
                        arrowEl.setAttribute('transform', `rotate(${APP.lastAz}, 20, 20)`);
                    }
                    console.log('[Marker] Позиция обновлена, азимут:', APP.lastAz);
                } else {
                    console.warn('[Marker] Маркер не найден!');
                }
                $('telSpeed').textContent = Math.round(APP.currentSpeed);

                // Обновляем компас если маршрут загружен
                const previewIndex = APP.navPreviewIndex >= 0 ? APP.navPreviewIndex : APP.navCurrentIndex;
                if (previewIndex >= 0 && APP.navPoints[previewIndex]) {
                    const t = APP.navPoints[previewIndex];
                    let ad = Math.abs(APP.lastAz - t.az) % 360;
                    if (ad > 180) ad = 360 - ad;
                    const compass = $('hudCompass');
                    const userArrow = $('hudUserArrow');
                    const targetArrow = $('hudTargetArrow');
                    if (compass && userArrow && targetArrow) {
                        userArrow.style.transform = `rotate(${APP.lastAz}deg)`;
                        targetArrow.style.transform = `rotate(${t.az}deg)`;
                        compass.classList.toggle('in-range', ad <= APP.navConfig.AZ_TOLERANCE);
                    }
                }

                if (APP.autoCenter && APP.map) {
                    APP.map.update({
                        location: {
                            center: coords
                        }
                    });
                }
                if (APP.navCurrentIndex >= 0 && APP.navPreviewIndex < 0) navCheckTriggers();
            },
            (err) => {
                console.error('[Geo] Ошибка:', err.code, err.message);
            },
            { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
        );
    } else {
        console.error('[Geo] Геолокация не поддерживается браузером');
    }
}

function toggleAutoCenter() {
    APP.autoCenter = !APP.autoCenter;
    $('locateBtn').classList.toggle('active', APP.autoCenter);
    if (APP.autoCenter && APP.lastPos) {
        APP.map.update({
            location: {

            }
        });

    showToast(APP.autoCenter ? 'Привязка включена' : 'Привязка отключена');
}

function getNavIconSvg(col, txt, az, isEnd, isCurr = false, hasComm = false) {
    const s = isEnd ? 34 : 40, c = s / 2;
    const strk = isCurr ? '#00FF00' : '#000000';
    const textColor = hasComm ? '#B03050' : '#000000';
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}">
        <g transform="rotate(${az},${c},${c})">
            <polygon points="${c},2 ${c+10},${s-5} ${c},${s-14} ${c-10},${s-5}" fill="${col}" stroke="${strk}" stroke-width="1.5"/>
        </g>
        <circle cx="${c}" cy="${c}" r="${isEnd ? 7 : 9}" fill="${col}" stroke="${strk}" stroke-width="1.5"/>
        <text x="${c}" y="${c+0.5}" font-size="${isEnd ? 8 : 9}" font-family="Arial" font-weight="900" text-anchor="middle" dominant-baseline="middle" fill="${textColor}" stroke="white" stroke-width="2" style="paint-order:stroke fill">${txt}</text>
    </svg>`;
    return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
}

// Очистка маршрута с карты
function clearRoute() {
    if (APP.map && APP.navPoints) {
        APP.navPoints.forEach(p => {
            if (p.placemark) APP.map.removeChild(p.placemark);
            if (p.line) APP.map.removeChild(p.line);
            if (p.lineOutline) APP.map.removeChild(p.lineOutline);
            if (p.endPlacemark) APP.map.removeChild(p.endPlacemark);
        });
    }
    APP.navPoints = [];
    APP.navCurrentIndex = 0;
    APP.navPreviewIndex = -1;
    $('hud').classList.remove('active');
}

function renderRoutePoints() {
    if (APP.map && APP.navPoints) {
        APP.navPoints.forEach(p => {
            if (p.placemark) APP.map.removeChild(p.placemark);
            if (p.line) APP.map.removeChild(p.line);
            if (p.lineOutline) APP.map.removeChild(p.lineOutline);
            if (p.endPlacemark) APP.map.removeChild(p.endPlacemark);
        });
    }

    APP.navPoints = APP.navPoints.map((p, i) => {
        const isCurrent = (i === APP.navCurrentIndex);
        const isPreview = (i === APP.navPreviewIndex);
        const isPassed = (i < APP.navCurrentIndex);
        const isPrevious = (i === APP.navCurrentIndex - 1);
        const hasComm = p.comm && p.comm.trim() !== '';

        const showPoint = APP.navPreviewIndex >= 0 ? isPreview : (!isPassed || isCurrent || isPrevious);
        const showPath = isCurrent || isPreview || isPrevious;

        if (!showPoint) return { ...p, placemark: null, line: null, endPlacemark: null, hidden: true };

        const iconUrl = getNavIconSvg(p.hex, p.id, p.az, false, isCurrent, hasComm);

        // Используем latLng (конвертированный [lng, lat])
        const placemark = new ymaps3.YMapMarker(
            {
                coordinates: p.pts[0], // [lng, lat]
                zIndex: (isCurrent || isPreview) ? 1000 : (isPassed ? 600 : 500)
            },
            // Создаём DOM-элемент для маркера
            (() => {
                const el = document.createElement('div');
                el.style.width = '40px';
                el.style.height = '40px';
                // Центрируем маркер: координата указывает на центр элемента
                el.style.transform = 'translate(-50%, -50%)';
                el.style.backgroundImage = `url(${iconUrl})`;
                el.style.backgroundSize = 'contain';
                el.style.backgroundRepeat = 'no-repeat';
                el.style.cursor = 'pointer';
                el.onclick = () => {
                    if (i !== APP.navCurrentIndex) showPreview(i);
                    else closePreview();
                };
                return el;
            })()
        );

        let line = null, lineOutline = null, endPlacemark = null;
        if (showPath && p.pts && p.pts.length >= 2) {
            const isCurrentOrPreview = isCurrent || isPreview;

            // В API v3 используем YMapFeature с LineString
            if (isCurrentOrPreview) {
                lineOutline = new ymaps3.YMapFeature(
                    {
                        geometry: {
                            type: 'LineString',
                            coordinates: p.pts
                        },
                        style: {
                            strokeColor: '#000000',
                            strokeWidth: 6,
                            strokeOpacity: 1
                        }
                    }
                );
            }

            line = new ymaps3.YMapFeature(
                {
                    geometry: {
                        type: 'LineString',
                        coordinates: p.pts
                    },
                    style: {
                        strokeColor: p.hex,
                        strokeWidth: isCurrent ? 4 : (isPreview || isPrevious ? 4 : 2),
                        strokeOpacity: isCurrent ? 1 : (isPreview ? 1 : (isPrevious ? 0.5 : 0.4))
                    }
                }
            );

            const last = p.pts[p.pts.length - 1]; // [lng, lat]
            const prev = p.pts[p.pts.length - 2]; // [lng, lat]
            // calcAzimuth ожидает [lat, lon], поэтому меняем местами
            const endIconUrl = getNavIconSvg(p.hex, p.id, calcAzimuth([prev[1], prev[0]], [last[1], last[0]]), true, isCurrent, hasComm);

            endPlacemark = new ymaps3.YMapMarker(
                {
                    coordinates: last
                },
                (() => {
                    const el = document.createElement('div');
                    el.style.width = '34px';
                    el.style.height = '34px';
                    // Центрируем маркер: координата указывает на центр элемента
                    el.style.transform = 'translate(-50%, -50%)';
                    el.style.backgroundImage = `url(${endIconUrl})`;
                    el.style.backgroundSize = 'contain';
                    el.style.backgroundRepeat = 'no-repeat';
                    el.style.pointerEvents = 'none'; // Неинтерактивный
                    return el;
                })()
            );
        }

        if (APP.map) {
            APP.map.addChild(placemark);
            if (lineOutline) APP.map.addChild(lineOutline);
            if (line) APP.map.addChild(line);
            if (endPlacemark) APP.map.addChild(endPlacemark);
        }

        return { ...p, placemark, line, lineOutline, endPlacemark, hidden: false };
    });

    renderPointsList();
    updateHud();
}

function updateHud() {
    const isPreview = APP.navPreviewIndex >= 0;
    const idx = isPreview ? APP.navPreviewIndex : APP.navCurrentIndex;
    const t = APP.navPoints[idx];
    if (!t) return;

    $('hudIndex').textContent = idx + 1;
    $('hudCmd').textContent = t.cmd;
    $('speakBtn').onclick = () => playCommand(t.cmd);

    $('selectBtn').style.display = isPreview ? 'block' : 'none';
    if (isPreview) $('selectBtn').onclick = () => setTarget(idx);

    document.querySelector('.hud-stats').style.display = 'flex';

    const compass = $('hudCompass');
    const targetArrow = $('hudTargetArrow');
    if (compass && targetArrow) {
        targetArrow.style.transform = `rotate(${t.az}deg)`;
    }

    if (APP.lastPos) {
        // t.pts[0] = [lng, lat], APP.lastPos = [lng, lat]
        const d = calcDistance(APP.lastPos, t.pts[0]);
        let ad = Math.abs(APP.lastAz - t.az) % 360;
        if (ad > 180) ad = 360 - ad;
        $('hudDist').textContent = `${Math.round(d)}`;
        $('hudDist').classList.toggle('in-range', d <= APP.navConfig.TRIGGER_DIST);

        const compass = $('hudCompass');
        const userArrow = $('hudUserArrow');
        const targetArrow = $('hudTargetArrow');
        if (userArrow && targetArrow) {
            userArrow.style.transform = `rotate(${APP.lastAz || 0}deg)`;
            targetArrow.style.transform = `rotate(${t.az || 0}deg)`;
        }
        if (compass) {
            compass.classList.toggle('in-range', ad <= APP.navConfig.AZ_TOLERANCE);
        }
    } else if (!isPreview) {
        $('hudDist').textContent = '---';
        $('hudDist').classList.remove('in-range');
    } else {
        $('hudDist').textContent = '---';
        $('hudDist').classList.remove('in-range');
        $('hudCompass').classList.remove('in-range');
    }

    const prevBtn = $('prevBtn'), nextBtn = $('nextBtn');
    prevBtn.disabled = (idx <= 0);
    nextBtn.disabled = (idx >= APP.navPoints.length - 1);
    prevBtn.onclick = () => idx > 0 && showPreview(idx - 1);
    nextBtn.onclick = () => idx < APP.navPoints.length - 1 && showPreview(idx + 1);

    const hasComm = t.comm && t.comm.trim() !== '';
    $('commentText').textContent = t.comm;
    $('commentBlock').classList.toggle('visible', hasComm);
}

function updateHudDist(d, ad) {
    $('hudDist').textContent = `${Math.round(d)}`;
    $('hudDist').classList.toggle('in-range', d <= APP.navConfig.TRIGGER_DIST);

    const compass = $('hudCompass');
    const userArrow = $('hudUserArrow');
    const targetArrow = $('hudTargetArrow');
    const idx = APP.navPreviewIndex >= 0 ? APP.navPreviewIndex : APP.navCurrentIndex;
    const targetPoint = APP.navPoints[idx];

    if (userArrow && targetArrow && targetPoint) {
        userArrow.style.transform = `rotate(${APP.lastAz || 0}deg)`;
        targetArrow.style.transform = `rotate(${targetPoint.az || 0}deg)`;
    }

    compass.classList.toggle('in-range', ad <= APP.navConfig.AZ_TOLERANCE);
}

function showPreview(i) {
    const p = APP.navPoints[i];
    if (!p) return;
    $('pointsList').style.display = 'none';
    APP.navPreviewIndex = i;
    updateHud();
    renderRoutePoints();

    if (p.pts && p.pts.length >= 2) {
        const firstPt = p.pts[0]; // [lng, lat]
        const lastPt = p.pts[p.pts.length - 1]; // [lng, lat]

        const lngDiff = Math.abs(lastPt[0] - firstPt[0]);
        const latDiff = Math.abs(lastPt[1] - firstPt[1]);

        const minLng = Math.min(firstPt[0], lastPt[0]);
        const maxLng = Math.max(firstPt[0], lastPt[0]);
        const minLat = Math.min(firstPt[1], lastPt[1]);
        const maxLat = Math.max(firstPt[1], lastPt[1]);

        const lngMargin = (maxLng - minLng) * 0.3 || 0.001;
        const latMargin = (maxLat - minLat) * 0.3 || 0.001;

        const requiredBounds = [
            [minLat - latMargin, minLng - lngMargin],
            [maxLat + latMargin, maxLng + lngMargin]
        ];

        const centerPt = [(firstPt[0] + lastPt[0]) / 2, (firstPt[1] + lastPt[1]) / 2];
        APP.map.update({
            location: {
                center: centerPt
            }
        });
    } else if (p.pts && p.pts.length > 0) {
        APP.map.update({
            location: {
                center: p.pts[0]
            }
        });
    }
}

function setTarget(i) {
    APP.navCurrentIndex = i;
    APP.navPreviewIndex = -1;
    renderRoutePoints();
    updateHud();
    $('pointsList').style.display = 'none';

    if (APP.lastPos && APP.navPoints[APP.navCurrentIndex]) {
        const t = APP.navPoints[APP.navCurrentIndex];
        const d = calcDistance(APP.lastPos, t.pts[0]);
        let ad = Math.abs(APP.lastAz - t.az) % 360;
        if (ad > 180) ad = 360 - ad;
        const compass = $('hudCompass');
        if (compass) {
            compass.classList.toggle('in-range', ad <= APP.navConfig.AZ_TOLERANCE);
        }
        $('hudDist').textContent = `${Math.round(d)}`;
        $('hudDist').classList.toggle('in-range', d <= APP.navConfig.TRIGGER_DIST);
    }
}

function closePreview() {
    APP.navPreviewIndex = -1;
    renderRoutePoints();
    updateHud();

    if (APP.lastPos && APP.navPoints[APP.navCurrentIndex]) {
        const t = APP.navPoints[APP.navCurrentIndex];
        const d = calcDistance(APP.lastPos, t.pts[0]);
        let ad = Math.abs(APP.lastAz - t.az) % 360;
        if (ad > 180) ad = 360 - ad;
        const compass = $('hudCompass');
        if (compass) {
            compass.classList.toggle('in-range', ad <= APP.navConfig.AZ_TOLERANCE);
        }
        $('hudDist').textContent = `${Math.round(d)}`;
        $('hudDist').classList.toggle('in-range', d <= APP.navConfig.TRIGGER_DIST);
    }
}

function renderPointsList() {
    const list = $('pointsListContent');
    if (!list) return;
    list.innerHTML = APP.navPoints.map((p, i) => {
        const isPassed = i < APP.navCurrentIndex;
        const isCurrent = i === APP.navCurrentIndex;
        const isPreview = i === APP.navPreviewIndex;
        const isPrevious = i === APP.navCurrentIndex - 1;
        const cmdSafe = p.cmd.replace(/'/g, "\\'");
        const hasComm = p.comm && p.comm.trim() !== '';
        const badgeStyle = isCurrent ? 'background:#00FF00;color:black' :
                          isPreview ? 'background:rgba(61,160,255,0.6);color:black' :
                          isPrevious ? 'background:rgba(255,255,255,0.5);color:black' :
                          isPassed ? 'background:rgba(255,255,255,0.2)' : '';
        const opacity = isPrevious ? 0.6 : (isPassed && !isPreview ? 0.4 : 1);
        return `<div class="point-item ${isCurrent || isPreview ? 'active' : ''}" onclick="showPreview(${i});" style="opacity:${opacity}">
            <div class="point-badge" style="${badgeStyle}">${p.id}</div>
            <div class="point-content">
                <div class="point-name" style="display:flex; align-items:center; gap:6px;">
                    ${p.cmd}
                    ${hasComm ? '<span style="display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; background:rgba(255,149,0,0.9); border-radius:50%; color:#fff; font-size:13px; font-weight:800; flex-shrink:0;">i</span>' : ''}
                </div>
            </div>
            <button class="action-icon-btn" onclick="event.stopPropagation(); playCommand('${cmdSafe}');">
                <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            </button>
        </div>`;
    }).join('');
}

function togglePointsList() {
    const menu = $('pointsList');
    menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
    if (menu.style.display === 'flex') renderPointsList();

function getAudioPath(text) {
    if (!text) return null;
    const normalized = text.normalize('NFC').toLowerCase()
        .replace(/[.,\/#!$%\^&\*;:{}=\-`~()]/g, "").trim()
        .replace(/\s+/g, '_');
    return `audio/${encodeURIComponent(normalized)}.mp3`;
}

async function playCommand(text) {
    const path = getAudioPath(text);
    if (!path) return;
    APP.navAudio.pause();
    if ('caches' in window) {
        try {
            const cache = await caches.open('route-audio-v1');
            const cached = await cache.match(path);
            if (cached) {
                APP.navAudio.src = URL.createObjectURL(await cached.blob());
                APP.navAudio.play().catch(e => console.error(e));
                return;
            }
        } catch (e) { console.warn("Cache error:", e); }
    }
    APP.navAudio.src = path;
    APP.navAudio.play().catch(e => console.warn("Audio play failed:", e));
}

async function preloadAudio() {
    if (!('caches' in window)) return;
    const cache = await caches.open('route-audio-v1');
    const allPaths = ALL_AUDIO_COMMANDS.map(cmd => getAudioPath(cmd)).filter(p => p);
    const uniquePaths = [...new Set(allPaths)];
    let loaded = 0;
    let failed = 0;
    for (const path of uniquePaths) {
        try {
            const res = await fetch(path);
            if (res.ok) await cache.put(path, res);
            else failed++;
        } catch (e) {
            failed++;
        }
        loaded++;
    }
}

function navCheckTriggers() {
    if (APP.navCurrentIndex < 0 || !APP.lastPos || !APP.navPoints[APP.navCurrentIndex]) return;
    const t = APP.navPoints[APP.navCurrentIndex];
    const d = calcDistance(APP.lastPos, t.pts[0]);
    let ad = Math.abs(APP.lastAz - t.az) % 360;
    if (ad > 180) ad = 360 - ad;
    updateHudDist(d, ad);

    if (d <= APP.navConfig.TRIGGER_DIST && ad <= APP.navConfig.AZ_TOLERANCE) {
        playCommand(t.cmd);
        APP.navCurrentIndex++;
        APP.navPreviewIndex = -1;
        if (APP.navCurrentIndex < APP.navPoints.length) {
            renderRoutePoints();
            updateHud();
        } else {
            $('hudCmd').textContent = "ФИНИШ";
            showToast('Маршрут завершён!', 'success');
        }
    }
}

function loadRouteFromJSON(data) {
    processRouteData(data, 'Маршрут');
}

function processRouteData(data, name) {
    startWakeLock();

    if (!data || !Array.isArray(data)) {
        throw new Error('Неверный формат данных: ожидается массив');
    }
    if (data.length === 0) {
        throw new Error('Маршрут пуст');
    }

    APP.navPoints = data.map((d, i) => {
        const pts = d.pts || [];
        if (!pts || pts.length === 0) {
            console.warn('Точка ' + i + ' без координат, пропускаем');
            return null;
        }
        // Конвертируем из [lat, lon] в [lng, lat] для API v3
        const ptsConverted = pts.map(p => [p[1], p[0]]);
        return {
            id: d.id || (i + 1),
            lat: pts[0]?.[0],
            lon: pts[0]?.[1],
            latLng: [ptsConverted[0][0], ptsConverted[0][1]], // [lng, lat] для API v3
            color: d.color,
            hex: COLORS[d.color]?.hex || '#007AFF',
            cmd: (d.cmd || d.comm || `Т${i + 1}`).trim(),
            comm: d.comm || '',
            pts: ptsConverted, // Конвертированные координаты
            az: pts.length >= 2 ? calcAzimuth(pts[0], pts[1]) : 0
        };
    }).filter(p => p !== null);

    if (APP.navPoints.length === 0) {
        throw new Error('Нет валидных точек в маршруте');
    }

    APP.navCurrentIndex = 0;
    APP.navPreviewIndex = -1;

    $('hud').classList.add('active');
    $('telemetryPanel').classList.add('visible');
    $('jsonModal').classList.add('hidden');
    $('loading').classList.add('hidden');

    renderRoutePoints();
    updateHud();

    if (APP.navPoints.length > 0 && APP.map) {
        setTimeout(() => {
            let minLat = Infinity, maxLat = -Infinity;
            let minLng = Infinity, maxLng = -Infinity;

            APP.navPoints.forEach(p => {
                if (p.pts && p.pts.length > 0) {
                    const lat = p.pts[0][1]; // [lng, lat] -> lat = index 1
                    const lng = p.pts[0][0]; // [lng, lat] -> lng = index 0
                    if (lat < minLat) minLat = lat;
                    if (lat > maxLat) maxLat = lat;
                    if (lng < minLng) minLng = lng;
                    if (lng > maxLng) maxLng = lng;
                }
            });

            if (minLat !== Infinity) {
                const centerLat = (minLat + maxLat) / 2;
                const centerLng = (minLng + maxLng) / 2;
                APP.map.update({
                    location: {
                        center: [centerLng, centerLat], // [lng, lat]
                        zoom: 14
                    }
                });
            }
        }, 100);
    }
    preloadAudio();

    let routeName = name;
    const searchParam = new URLSearchParams(window.location.search).get('m');
    if (searchParam) {
        routeName = searchParam;
    } else {
        const hash = window.location.hash.slice(1);
        if (hash) {
            const hashParams = new URLSearchParams(hash);
            const hashParam = hashParams.get('m');
            if (hashParam) {
                routeName = hashParam;
            }
        }
    }
}

// ============================================
// WAKE LOCK (Видео + Аудио + Canvas)
// ============================================
let wakeLockInterval = null;
const wakeVideo = document.getElementById('wakeLockVideo');
let wakeCanvas = null;
let wakeCanvasStream = null;

function initWakeVideo() {
    if (!wakeCanvas) {
        wakeCanvas = document.createElement('canvas');
        wakeCanvas.width = 1;
        wakeCanvas.height = 1;
        const ctx = wakeCanvas.getContext('2d');
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, 1, 1);

        if (wakeCanvas.captureStream) {
            wakeCanvasStream = wakeCanvas.captureStream(30);
        } else if (wakeCanvas.mozCaptureStream) {
            wakeCanvasStream = wakeCanvas.mozCaptureStream(30);
        }
    }
}

function initAudioContext() {
    if (typeof AudioContext !== 'undefined') {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        gainNode.gain.value = 0;
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        setTimeout(() => oscillator.stop(), 100);
        return audioCtx;
    }
    return null;
}

function startWakeLock() {
    initWakeVideo();
    if (wakeVideo && wakeCanvasStream) {
        wakeVideo.srcObject = wakeCanvasStream;
        wakeVideo.play().catch(e => console.log('Wake video error:', e));
    }
    const audioCtx = initAudioContext();
    if ('vibrate' in navigator) {
        navigator.vibrate(0);
    }
    if (wakeLockInterval) clearInterval(wakeLockInterval);
    wakeLockInterval = setInterval(() => {
        if (wakeVideo && wakeVideo.paused) {
            wakeVideo.play().catch(e => console.log('Wake video restart error:', e));
        }
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        if (wakeCanvas) {
            const ctx = wakeCanvas.getContext('2d');
            ctx.fillStyle = '#' + Math.floor(Math.random()*16777215).toString(16);
            ctx.fillRect(0, 0, 1, 1);
        }
    }, 3000);
}

function stopWakeLock() {
    if (wakeLockInterval) {
        clearInterval(wakeLockInterval);
        wakeLockInterval = null;
    }
    if (wakeVideo) {
        wakeVideo.pause();
        wakeVideo.srcObject = null;
    }
}

document.addEventListener('DOMContentLoaded', () => {
    setTimeout(startWakeLock, 500);
});

        '@yandex/ymaps3-default-ui-theme'

        },

    );
    
    // Сохраняем ссылку на DOM-элемент для обновления

    initGeolocation();

        e.stopPropagation();

    });

    let mapTypeIndex = 0;

    });
