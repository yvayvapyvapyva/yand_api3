    <script src="https://api-maps.yandex.ru/v3/?apikey=c0e28937-4e16-4d15-9b99-09a30cb8fc13&lang=ru_RU"></script>

    <style>
    :root{--bg:#050505;--dark-panel:rgba(20,20,20,0.85);--btn-txt:#fff;--border:rgba(255,255,255,0.25);--panel-blur:blur(22px);--target-lime:#0f0;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);--btn-size:56px;--shadow:0 10px 25px rgba(0,0,0,0.22)}
    html,body{margin:0;padding:0;height:100%;width:100%;font-family:-apple-system,sans-serif;overflow:hidden;background:var(--bg);position:fixed;touch-action:none;color:var(--btn-txt)}
    #map{position:absolute;inset:0;z-index:1}
    [class*="-copyrights-pane"],[class*="-map-copyrights-promo"],[class*="-controls-pane"]{display:none!important}
    .loading-overlay{position:fixed;inset:0;background:rgba(8,10,14,0.95);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-weight:600;text-align:center;padding:20px;backdrop-filter:blur(10px)}
    .loading-overlay.hidden{opacity:0;pointer-events:none;transition:opacity .5s}
    #wakeLockVideo{position:fixed;width:1px;height:1px;opacity:.001;pointer-events:none;z-index:-9999}
    .circle-btn{position:absolute;z-index:9005;background:var(--dark-panel);backdrop-filter:var(--panel-blur);-webkit-backdrop-filter:var(--panel-blur);width:var(--btn-size);height:var(--btn-size);border-radius:50%;border:1px solid var(--border);color:var(--btn-txt);cursor:pointer;transition:transform .15s,background .15s;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
    .circle-btn svg{fill:currentColor;width:24px;height:24px}
    .circle-btn:active{transform:scale(.95);background:rgba(30,32,40,0.9)}
    .circle-btn.active{background:rgba(52,199,89,0.42);border-color:rgba(103,255,153,0.45)}
    #listBtn{top:calc(16px + var(--safe-top));left:16px}#locateBtn{top:calc(16px + var(--safe-top));right:16px}#autoRouteBtn{top:calc(82px + var(--safe-top));left:16px}
    #telemetryPanel{position:absolute;top:calc(16px + var(--safe-top) + 66px);right:16px;z-index:9005;background:var(--dark-panel);backdrop-filter:var(--panel-blur);border-radius:50%;border:1px solid var(--border);box-shadow:var(--shadow);transition:transform .15s,background .15s;width:var(--btn-size);height:var(--btn-size);box-sizing:border-box;display:none;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px}
    #telemetryPanel.visible{display:flex}#telemetryPanel:active{transform:scale(.95)}
    .tel-item{display:flex;flex-direction:column;align-items:center}.tel-label{font-size:8px;color:#aaa;font-weight:700;text-transform:uppercase}.tel-value{font-size:13px;font-weight:800;text-align:center}
    #hud{position:absolute;bottom:calc(24px + var(--safe-bottom));left:16px;right:16px;z-index:9000;background:var(--dark-panel);backdrop-filter:var(--panel-blur);border-radius:20px;padding:16px;color:var(--btn-txt);border:1px solid var(--border);box-shadow:0 12px 24px rgba(0,0,0,0.22);display:none;flex-direction:column;gap:8px;pointer-events:auto;width:calc(100% - 32px);box-sizing:border-box}
    #hud.active{display:flex}.hud-header{display:flex;align-items:center;gap:10px}.hud-index{background:rgba(255,255,255,0.2);color:#fff;font-size:10px;font-weight:800;padding:2px 6px;border-radius:6px}.hud-cmd{font-size:16px;font-weight:700;flex:1}
    .hud-header .action-icon-btn{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.12);border:1px solid var(--border);cursor:pointer;flex-shrink:0}
    .hud-header .action-icon-btn svg{fill:#f3f4f6;width:20px;height:20px}.hud-header .action-icon-btn:active{transform:scale(.95)}
    .hud-actions{width:100%;display:flex;padding-top:8px;gap:8px;align-items:center;border-top:1px solid rgba(255,255,255,0.1)}
    .hud-stats{display:flex;flex-direction:row;align-items:center;gap:8px}.hud-stats .stat-item{display:flex;flex-direction:column;align-items:center;gap:4px}
    .stat-value{font-size:14px;font-weight:800;line-height:1}.stat-value.in-range{color:var(--target-lime)}.stat-label-unit{font-size:10px;color:#888;font-weight:700}
    .azimuth-compass{width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.3);border:2px solid rgba(255,255,255,0.3);position:relative;display:flex;align-items:center;justify-content:center;transition:background .3s,border-color .3s;flex-shrink:0}
    .azimuth-compass.in-range{background:rgba(0,255,0,0.15);border-color:var(--target-lime)}
    .compass-arrow{position:absolute;width:2px;height:26px;transform-origin:center;top:50%;margin-top:-13px;border-radius:2px;transition:transform .3s ease-out;display:flex;flex-direction:column;align-items:center}
    .compass-arrow::before{content:'';width:2px;height:20px;border-radius:2px}.compass-arrow::after{content:'';width:0;height:0;border-left:3px solid transparent;border-right:3px solid transparent;border-bottom:5px solid currentColor;position:absolute;top:-4px}
    .compass-arrow-user{color:#F33;z-index:2}.compass-arrow-user::before{background:linear-gradient(to top,#F33,#F66)}.compass-arrow-target{color:#07A;z-index:1;opacity:.8}.compass-arrow-target::before{background:linear-gradient(to top,#07A,#5CF)}
    .compass-center{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.5);z-index:3}
    .action-icon-btn{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.12);border:1px solid var(--border);cursor:pointer;flex-shrink:0}.action-icon-btn svg{fill:#f3f4f6;width:20px;height:20px}
    #selectBtn{padding:10px 16px;border-radius:10px;border:1px solid var(--border);background:rgba(52,199,89,0.42);border-color:rgba(103,255,153,0.45);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:transform .15s,background .15s}#selectBtn:active{transform:scale(.95)}
    .nav-arrow-btn{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s,transform .15s}
    .nav-arrow-btn svg{fill:#fff;width:24px;height:24px;filter:drop-shadow(0 0 2px rgba(0,0,0,0.8))}.nav-arrow-btn:active{transform:scale(.95);background:rgba(255,255,255,0.3)}.nav-arrow-btn:disabled{opacity:.3;cursor:not-allowed}
    #pointsList{position:absolute;top:calc(16px + var(--safe-top) + 66px);bottom:calc(24px + var(--safe-bottom) + 150px);left:16px;width:calc(100% - 32px);background:var(--dark-panel);backdrop-filter:var(--panel-blur);border-radius:14px;border:1px solid var(--border);z-index:9700;box-shadow:0 20px 40px rgba(0,0,0,0.35);pointer-events:auto;display:none;flex-direction:column;overflow:hidden}
    #pointsList .header{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.1);font-weight:800;font-size:11px;text-align:center;color:rgba(255,255,255,0.5);text-transform:uppercase}
    #pointsListContent{overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
    .point-item{display:flex;align-items:flex-start;gap:10px;padding:12px;border-radius:16px;color:#fff;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer}.point-item:active{background:rgba(255,255,255,0.08)}.point-item.active{background:rgba(255,255,255,0.14)}
    .point-badge{min-width:24px;height:24px;border-radius:8px;background:rgba(255,255,255,0.1);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:4px}.active .point-badge{background:rgba(255,255,255,0.24);color:#fff}
    .point-content{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}.point-name{font-size:15px;font-weight:600;line-height:1.3;color:#fff;word-wrap:break-word}
    #commentBlock{display:none;margin-bottom:10px;padding:10px;background:rgba(255,149,0,0.15);border-radius:10px;border:1px solid rgba(255,149,0,0.4)}#commentBlock.visible{display:block}#commentText{font-size:12px;line-height:1.5;color:#e5e7eb;white-space:pre-wrap}#closeCommentBtn{width:20px;height:20px;border-radius:6px;background:rgba(255,149,0,0.3);border:1px solid rgba(255,149,0,0.5);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;line-height:1;flex-shrink:0}
    #toast{position:fixed;top:calc(80px + var(--safe-top));left:50%;transform:translateX(-50%) translateY(-100px);background:var(--dark-panel);color:#fff;padding:14px 24px;border-radius:16px;font-size:14px;z-index:9999;transition:.4s;opacity:0;backdrop-filter:var(--panel-blur);border:1px solid var(--border);font-weight:700;max-width:80vw;white-space:pre-wrap;text-align:center;line-height:1.4;pointer-events:none}
    #toast.show{transform:translateX(-50%) translateY(0);opacity:1}#toast.success{background:rgba(52,199,89,0.95)}#toast.error{background:rgba(255,59,48,0.95)}#toast.info{background:rgba(0,0,0,0.82)}
    </style>
</head>
<body>
<div id="loading" class="loading-overlay"><div id="loadingText">ЗАГРУЗКА...</div><div id="errorMsg" style="color:#F33;display:none;margin-top:10px"></div></div>
<video id="wakeLockVideo" playsinline muted loop></video>
<div id="map"></div>
<button id="listBtn" class="circle-btn" aria-label="Список точек"><svg viewBox="0 0 24 24"><path d="M4 10.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm0-6c-.83 0-1.5.67-1.5 1.5S3.17 7.5 4 7.5 5.5 6.83 5.5 6 4.83 4.5 4 4.5zm0 12c-.83 0-1.5.68-1.5 1.5s.68 1.5 1.5 1.5 1.5-.68 1.5-1.5-.67-1.5-1.5-1.5zM7 19h14v-2H7v2zm0-6h14v-2H7v2zm0-8v2h14V5H7z"/></svg></button>
<button id="locateBtn" class="circle-btn" aria-label="Геолокация"><svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg></button>
<button id="autoRouteBtn" class="circle-btn" title="Ведение по маршруту" aria-label="Авто-ведение"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
<div id="telemetryPanel" class="visible" style="cursor:pointer;" title="Нажмите для изменения наклона"><div class="tel-item"><span class="tel-label" id="modeIndicator" style="font-size:9px;color:#34C759;font-weight:800">2D</span><span class="tel-label">КМ/Ч</span><span class="tel-value" id="telSpeed">0</span></div></div>
<div id="hud">
    <div id="commentBlock"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px"><div id="commentText"></div><button id="closeCommentBtn">×</button></div></div>
    <div class="hud-header"><span class="hud-index" id="hudIndex">1</span><div class="hud-cmd" id="hudCmd">Маршрут не выбран</div><button id="speakBtn" class="action-icon-btn" aria-label="Воспроизвести"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></button></div>
    <div class="hud-actions">
        <button id="prevBtn" class="nav-arrow-btn" title="Предыдущая точка" aria-label="Предыдущая"><svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg></button>
        <div class="hud-stats"><div class="stat-item"><span class="stat-value" id="hudDist">---</span><span class="stat-label-unit">м</span></div><div class="azimuth-compass" id="hudCompass"><div class="compass-arrow compass-arrow-user" id="hudUserArrow"></div><div class="compass-arrow compass-arrow-target" id="hudTargetArrow"></div><div class="compass-center"></div></div></div>
        <div style="display:flex;gap:8px;flex:1;justify-content:center;align-items:center"><button id="selectBtn" style="display:none">Выбрать</button></div>
        <button id="nextBtn" class="nav-arrow-btn" title="Следующая точка" aria-label="Следующая"><svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></button>
    </div>
</div>
<div id="pointsList"><div class="header">Список точек</div><div id="pointsListContent"></div></div>
<div id="toast"></div>

<script>
// ============================================
// КОНФИГУРАЦИЯ
// ============================================
const COLORS={Gold:{hex:'#FFD700'},Blue:{hex:'#007AFF'},Red:{hex:'#F33'},Fuchsia:{hex:'#AF52DE'},Orange:{hex:'#F90'},Purple:{hex:'#5856D6'},Cyan:{hex:'#5CF'},Brown:{hex:'#A2845E'},Lime:{hex:'#3C7'}};
const APP={map:null,userMarker:null,userMarkerEl:null,lastPos:null,lastAz:0,autoCenter:false,currentSpeed:0,navPoints:[],navCurrentIndex:0,navPreviewIndex:-1,navAudio:new Audio(),navConfig:{TRIGGER_DIST:25,AZ_TOLERANCE:45,SPEED_THRESHOLD:2}};
window.APP=APP;
const $=id=>document.getElementById(id);
const toRad=deg=>deg*Math.PI/180;
const toDeg=rad=>rad*180/Math.PI;

// ============================================
// VK MINI APPS
// ============================================
if(typeof vkBridge!=='undefined')vkBridge.send('VKWebAppInit');

// ============================================
// УВЕДОМЛЕНИЯ
// ============================================
let toastTimer=null;
function showToast(text,type='info',duration=2000){
    const el=$('toast');el.textContent=text;el.className=`toast ${type} show`;
    if(toastTimer)clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>el.classList.remove('show'),duration);
}

// ============================================
// ГЕОЛОКАЦИЯ
// ============================================
function calcAzimuth(p1,p2){
    if(!p1||!p2)return 0;
    const[la1,lo1]=p1.map(toRad);const[la2,lo2]=p2.map(toRad);
    const y=Math.sin(lo2-lo1)*Math.cos(la2);
    const x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(lo2-lo1);
    return Math.round((toDeg(Math.atan2(y,x))+360)%360);
}

function calcDistance(p1,p2){
    if(!p1||!p2)return 0;
    const R=6371000;const[lng1,lat1]=p1.map(toRad);const[lng2,lat2]=p2.map(toRad);
    const dLat=lat2-lat1;const dLon=lng2-lng1;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function initGeolocation(){
    if(!navigator.geolocation){console.error('[Geo] Не поддерживается');return;}
    navigator.geolocation.watchPosition((pos)=>{
        const coords=[pos.coords.longitude,pos.coords.latitude];
        const speed=(pos.coords.speed||0)*3.6;
        if(APP.lastPos&&speed>=APP.navConfig.SPEED_THRESHOLD)APP.lastAz=calcAzimuth([APP.lastPos[1],APP.lastPos[0]],[coords[1],coords[0]]);
        APP.lastPos=coords;APP.currentSpeed=speed;
        if(APP.userMarker&&APP.userMarkerEl){
            APP.userMarker.update({coordinates:coords});
            const arrowEl=APP.userMarkerEl.querySelector('#user-arrow');
            if(arrowEl)arrowEl.setAttribute('transform',`rotate(${APP.lastAz},20,20)`);
        }
        $('telSpeed').textContent=Math.round(APP.currentSpeed);
        const previewIndex=APP.navPreviewIndex>=0?APP.navPreviewIndex:APP.navCurrentIndex;
        if(previewIndex>=0&&APP.navPoints[previewIndex]){
            const t=APP.navPoints[previewIndex];
            let ad=Math.abs(APP.lastAz-t.az)%360;if(ad>180)ad=360-ad;
            const compass=$('hudCompass'),userArrow=$('hudUserArrow'),targetArrow=$('hudTargetArrow');
            if(compass&&userArrow&&targetArrow){
                userArrow.style.transform=`rotate(${APP.lastAz}deg)`;targetArrow.style.transform=`rotate(${t.az}deg)`;
                compass.classList.toggle('in-range',ad<=APP.navConfig.AZ_TOLERANCE);
            }
        }
        if(APP.autoCenter&&APP.lastPos)APP.map.update({location:{center:APP.lastPos}});
        if(APP.navCurrentIndex>=0&&APP.navPreviewIndex<0)navCheckTriggers();
    },(err)=>console.error('[Geo] Ошибка:',err.code,err.message),{enableHighAccuracy:true,maximumAge:5000,timeout:10000});
}

function toggleAutoCenter(){
    APP.autoCenter=!APP.autoCenter;
    $('locateBtn').classList.toggle('active',APP.autoCenter);
    if(APP.autoCenter&&APP.lastPos)APP.map.update({location:{center:APP.lastPos}});
    showToast(APP.autoCenter?'Привязка включена':'Привязка отключена');
}

// ============================================
// ОТРИСОВКА МАРШРУТА
// ============================================
function getNavIconSvg(col,txt,az,isEnd,isCurr=false,hasComm=false,isPrev=false){
    const s=isEnd?34:40,c=s/2;
    const strk=isCurr?'#0F0':(isPrev?'#888':'#000');
    const textColor=hasComm?'#B03050':'#000';
    const opacity=isPrev?'0.5':'1';
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" opacity="${opacity}"><g transform="rotate(${az},${c},${c})"><polygon points="${c},2 ${c+10},${s-5} ${c},${s-14} ${c-10},${s-5}" fill="${col}" stroke="${strk}" stroke-width="1.5"/></g><circle cx="${c}" cy="${c}" r="${isEnd?7:9}" fill="${col}" stroke="${strk}" stroke-width="1.5"/><text x="${c}" y="${c+0.5}" font-size="${isEnd?8:9}" font-family="Arial" font-weight="900" text-anchor="middle" dominant-baseline="middle" fill="${textColor}" stroke="white" stroke-width="2" style="paint-order:stroke fill">${txt}</text></svg>`;
    return'data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));
}

function clearRoute(){
    if(APP.map&&APP.navPoints)APP.navPoints.forEach(p=>{
        if(p.placemark)APP.map.removeChild(p.placemark);
        if(p.line)APP.map.removeChild(p.line);
        if(p.endPlacemark)APP.map.removeChild(p.endPlacemark);
    });
    APP.navPoints=[];APP.navCurrentIndex=0;APP.navPreviewIndex=-1;$('hud').classList.remove('active');
}

function renderRoutePoints(){
    if(APP.map&&APP.navPoints)APP.navPoints.forEach(p=>{
        if(p.placemark)APP.map.removeChild(p.placemark);
        if(p.line)APP.map.removeChild(p.line);
        if(p.endPlacemark)APP.map.removeChild(p.endPlacemark);
    });
    APP.navPoints=APP.navPoints.map((p,i)=>{
        const isCurrent=(i===APP.navCurrentIndex),isPreview=(i===APP.navPreviewIndex),isPassed=(i<APP.navCurrentIndex),isPrevious=(i===APP.navCurrentIndex-1),hasComm=p.comm&&p.comm.trim()!=='';
        const showPoint=APP.navPreviewIndex>=0?isPreview:(!isPassed||isCurrent||isPrevious);
        const showPath=APP.navPreviewIndex>=0?isPreview:(isCurrent||isPrevious);
        if(!showPoint)return{...p,placemark:null,line:null,endPlacemark:null,hidden:true};
        const iconIsPrevious=APP.navPreviewIndex>=0?false:isPrevious;
        const iconUrl=getNavIconSvg(p.hex,p.id,p.az,false,isCurrent,hasComm,iconIsPrevious);
        const placemark=new ymaps3.YMapMarker({coordinates:p.pts[0],zIndex:(isCurrent||isPreview)?1000:(isPassed?600:500)},(()=>{
            const el=document.createElement('div');
            el.style.cssText='width:40px;height:40px;transform:translate(-50%,-50%);background-size:contain;background-repeat:no-repeat;cursor:pointer;';
            el.style.backgroundImage=`url(${iconUrl})`;
            el.onclick=(e)=>{e.stopPropagation();if(i!==APP.navCurrentIndex)showPreview(i);else closePreview();};
            return el;
        })());
        let line=null,endPlacemark=null;
        if(showPath&&p.pts&&p.pts.length>=2){
            const lineOpacity=isPrevious?0.4:1;
            line=new ymaps3.YMapFeature({geometry:{type:'LineString',coordinates:p.pts},style:{stroke:[{width:4,color:p.hex,opacity:lineOpacity},{width:6,color:'#000',opacity:lineOpacity}]}});
            const last=p.pts[p.pts.length-1],prev=p.pts[p.pts.length-2];
            const endIconUrl=getNavIconSvg(p.hex,p.id,calcAzimuth([prev[1],prev[0]],[last[1],last[0]]),true,isCurrent,hasComm,iconIsPrevious);
            endPlacemark=new ymaps3.YMapMarker({coordinates:last},(()=>{const el=document.createElement('div');el.style.cssText=`width:34px;height:34px;transform:translate(-50%,-50%);background-image:url(${endIconUrl});background-size:contain;background-repeat:no-repeat;pointer-events:none;`;return el;})());
        }
        if(APP.map){APP.map.addChild(placemark);if(line)APP.map.addChild(line);if(endPlacemark)APP.map.addChild(endPlacemark);}
        return{...p,placemark,line,endPlacemark,hidden:false};
    });
    renderPointsList();updateHud();
}

function updateHud(){
    const isPreview=APP.navPreviewIndex>=0;const idx=isPreview?APP.navPreviewIndex:APP.navCurrentIndex;const t=APP.navPoints[idx];if(!t)return;
    $('hudIndex').textContent=idx+1;$('hudCmd').textContent=t.cmd;$('speakBtn').onclick=()=>playCommand(t.cmd);
    $('selectBtn').style.display=isPreview?'block':'none';if(isPreview)$('selectBtn').onclick=()=>setTarget(idx);
    document.querySelector('.hud-stats').style.display='flex';
    const compass=$('hudCompass'),targetArrow=$('hudTargetArrow');if(compass&&targetArrow)targetArrow.style.transform=`rotate(${t.az}deg)`;
    if(APP.lastPos){
        const d=calcDistance(APP.lastPos,t.pts[0]);let ad=Math.abs(APP.lastAz-t.az)%360;if(ad>180)ad=360-ad;
        $('hudDist').textContent=`${Math.round(d)}`;$('hudDist').classList.toggle('in-range',d<=APP.navConfig.TRIGGER_DIST);
        const userArrow=$('hudUserArrow');if(userArrow&&targetArrow){userArrow.style.transform=`rotate(${APP.lastAz||0}deg)`;targetArrow.style.transform=`rotate(${t.az||0}deg)`;}
        if(compass)compass.classList.toggle('in-range',ad<=APP.navConfig.AZ_TOLERANCE);
    }else if(!isPreview){$('hudDist').textContent='---';$('hudDist').classList.remove('in-range');}
    else{$('hudDist').textContent='---';$('hudDist').classList.remove('in-range');$('hudCompass').classList.remove('in-range');}
    const prevBtn=$('prevBtn'),nextBtn=$('nextBtn');
    prevBtn.disabled=(idx<=0);nextBtn.disabled=(idx>=APP.navPoints.length-1);
    prevBtn.onclick=()=>idx>0&&showPreviewWithAnimation(idx-1);nextBtn.onclick=()=>idx<APP.navPoints.length-1&&showPreviewWithAnimation(idx+1);
    const hasComm=t.comm&&t.comm.trim()!=='';$('commentText').textContent=t.comm;$('commentBlock').classList.toggle('visible',hasComm);
}

function updateHudDist(d,ad){
    $('hudDist').textContent=`${Math.round(d)}`;$('hudDist').classList.toggle('in-range',d<=APP.navConfig.TRIGGER_DIST);
    const compass=$('hudCompass'),userArrow=$('hudUserArrow'),targetArrow=$('hudTargetArrow'),idx=APP.navPreviewIndex>=0?APP.navPreviewIndex:APP.navCurrentIndex,targetPoint=APP.navPoints[idx];
    if(userArrow&&targetArrow&&targetPoint){userArrow.style.transform=`rotate(${APP.lastAz||0}deg)`;targetArrow.style.transform=`rotate(${targetPoint.az||0}deg)`;}
    if(compass)compass.classList.toggle('in-range',ad<=APP.navConfig.AZ_TOLERANCE);
}

// ============================================
// НАВИГАЦИЯ ПО ТОЧКАМ
// ============================================
function showPreview(i){const p=APP.navPoints[i];if(!p)return;$('pointsList').style.display='none';APP.navPreviewIndex=i;updateHud();renderRoutePoints();if(p.pts?.length>=2)smoothPreviewTo(p.pts[0]);}
function showPreviewWithAnimation(i){const p=APP.navPoints[i];if(!p)return;$('pointsList').style.display='none';APP.navPreviewIndex=i;updateHud();renderRoutePoints();if(p.pts?.length>=2)smoothPreviewTo(p.pts[0]);}

// Плавное перемещение камеры (используем встроенную анимацию Yandex Maps)
function smoothPreviewTo(targetCoords){
    if(!APP.map)return;
    APP.map.update({
        location:{
            center:targetCoords,
            duration:800,  // 800мс
            easing:'ease-in-out'  // Плавное начало и конец
        }
    });
}
function setTarget(i){APP.navCurrentIndex=i;APP.navPreviewIndex=-1;renderRoutePoints();updateHud();$('pointsList').style.display='none';if(APP.lastPos&&APP.navPoints[APP.navCurrentIndex]){const t=APP.navPoints[APP.navCurrentIndex],d=calcDistance(APP.lastPos,t.pts[0]);let ad=Math.abs(APP.lastAz-t.az)%360;if(ad>180)ad=360-ad;const compass=$('hudCompass');if(compass)compass.classList.toggle('in-range',ad<=APP.navConfig.AZ_TOLERANCE);$('hudDist').textContent=`${Math.round(d)}`;$('hudDist').classList.toggle('in-range',d<=APP.navConfig.TRIGGER_DIST);}}
function closePreview(){APP.navPreviewIndex=-1;renderRoutePoints();updateHud();if(APP.lastPos&&APP.navPoints[APP.navCurrentIndex]){const t=APP.navPoints[APP.navCurrentIndex],d=calcDistance(APP.lastPos,t.pts[0]);let ad=Math.abs(APP.lastAz-t.az)%360;if(ad>180)ad=360-ad;const compass=$('hudCompass');if(compass)compass.classList.toggle('in-range',ad<=APP.navConfig.AZ_TOLERANCE);$('hudDist').textContent=`${Math.round(d)}`;$('hudDist').classList.toggle('in-range',d<=APP.navConfig.TRIGGER_DIST);}}

function renderPointsList(){
    const list=$('pointsListContent');if(!list)return;
    list.innerHTML=APP.navPoints.map((p,i)=>{
        const isPassed=i<APP.navCurrentIndex,isCurrent=i===APP.navCurrentIndex,isPreview=i===APP.navPreviewIndex,isPrevious=i===APP.navCurrentIndex-1,hasComm=p.comm&&p.comm.trim()!=='';
        const badgeStyle=isCurrent?'background:#0F0;color:black':isPreview?'background:rgba(61,160,255,0.6);color:black':isPrevious?'background:rgba(255,255,255,0.5);color:black':isPassed?'background:rgba(255,255,255,0.2)':'';
        const opacity=isPrevious?0.6:(isPassed&&!isPreview?0.4:1);
        return`<div class="point-item ${isCurrent||isPreview?'active':''}" onclick="selectPointFromList(${i});" style="opacity:${opacity}"><div class="point-badge" style="${badgeStyle}">${p.id}</div><div class="point-content"><div class="point-name" style="display:flex;align-items:center;gap:6px">${p.cmd}${hasComm?'<span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;background:rgba(255,149,0,0.9);border-radius:50%;color:#fff;font-size:13px;font-weight:800;flex-shrink:0">i</span>':''}</div></div></div>`;
    }).join('');
}

function selectPointFromList(i){showPreview(i);$('pointsList').style.display='none';}
window.selectPointFromList=selectPointFromList;
function togglePointsList(){const menu=$('pointsList');menu.style.display=menu.style.display==='flex'?'none':'flex';if(menu.style.display==='flex')renderPointsList();}

const ALL_AUDIO_COMMANDS=["На перекрестке повернем налево","На перекрестке едем прямо","На перекрестке повернем направо","На перекрестке выполним разворот","На круговом движении первый съезд","На круговом движении второй съезд","На круговом движении третий съезд","На круговом движении четвертый съезд","На круговом движении выполним разворот","На регулируемом перекрестке повернем налево","На регулируемом перекрестке едем прямо","На регулируемом перекрестке повернем направо","На регулируемом перекрестке выполним разворот","На нерегулируемом перекрестке повернем налево","На нерегулируемом перекрестке едем прямо","На нерегулируемом перекрестке повернем направо","На нерегулируемом перекрестке выполним разворот","Выполним разворот вне перекрестка","Выполним разворот в ближайшем разрешенном месте","Найдите место для разворота и развернитесь","Выполняем разгон до максимальной скорости","Набираем максимальную скорость на данном участке дороги","Разгоняемся до максимальной разрешенной скорости","По моей команде выполним остановку и начало движения на подъеме","Выполняем остановку и начало движения на подъеме","Поворачиваем направо","Поворачиваем налево","Далее повернем направо","Далее повернем налево","На светофоре повернем направо","На светофоре повернем налево","Поворачиваем направо к ленте","Поворачиваем направо на заправку","Едем в прямом направлении","Выполняем параллельную парковку и гараж","Выполняем разворот в ограниченном пространстве","Выполним разворот в ограниченном пространстве с использованием передачи заднего хода","Выполняем остановку параллельно краю проезжей части","Выполняем остановку в ближайшем разрешенном месте","Начинаем движение","Как будете готовы начинаем движение","Выполним разворот в ближайшем разрешенном месте","Найдите место для остановки и остановитесь","Остановитесь в ближайшем разрешенном месте"];

function getAudioPath(text){if(!text)return null;const normalized=text.normalize('NFC').toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-`~()]/g,"").trim().replace(/\s+/g,'_');return`audio/${encodeURIComponent(normalized)}.mp3`;}

async function playCommand(text){
    const path=getAudioPath(text);if(!path)return;APP.navAudio.pause();
    if('caches' in window){try{const cache=await caches.open('route-audio-v1'),cached=await cache.match(path);if(cached){APP.navAudio.src=URL.createObjectURL(await cached.blob());APP.navAudio.play().catch(e=>console.error(e));return;}}catch(e){console.warn("Cache error:",e);}}
    APP.navAudio.src=path;APP.navAudio.play().catch(e=>console.warn("Audio play failed:",e));
}

async function preloadAudio(){
    if(!('caches' in window))return;const cache=await caches.open('route-audio-v1');
    const allPaths=ALL_AUDIO_COMMANDS.map(cmd=>getAudioPath(cmd)).filter(p=>p),uniquePaths=[...new Set(allPaths)];
    for(const path of uniquePaths){try{const res=await fetch(path);if(res.ok)await cache.put(path,res);}catch(e){}}
}

// ============================================
// ТРИГГЕРЫ
// ============================================
function navCheckTriggers(){
    if(APP.navCurrentIndex<0||!APP.lastPos||!APP.navPoints[APP.navCurrentIndex])return;
    const t=APP.navPoints[APP.navCurrentIndex],d=calcDistance(APP.lastPos,t.pts[0]);let ad=Math.abs(APP.lastAz-t.az)%360;if(ad>180)ad=360-ad;
    updateHudDist(d,ad);
    if(d<=APP.navConfig.TRIGGER_DIST&&ad<=APP.navConfig.AZ_TOLERANCE){
        playCommand(t.cmd);APP.navCurrentIndex++;APP.navPreviewIndex=-1;
        if(APP.navCurrentIndex<APP.navPoints.length){renderRoutePoints();updateHud();}
        else{$('hudCmd').textContent="ФИНИШ";showToast('Маршрут завершён!','success');}
    }
}

// ============================================
// ЗАГРУЗКА МАРШРУТА
// ============================================
function loadRouteFromJSON(data){processRouteData(data,'Маршрут');}

function processRouteData(data,name){
    clearRoute();startWakeLock();
    if(!data||!Array.isArray(data))throw new Error('Неверный формат данных: ожидается массив');
    if(data.length===0)throw new Error('Маршрут пуст');
    APP.navPoints=data.map((d,i)=>{
        const pts=d.pts||[];if(!pts||pts.length===0){console.warn('Точка '+i+' без координат');return null;}
        const ptsConverted=pts.map(p=>[p[1],p[0]]);
        return{id:d.id||(i+1),lat:pts[0]?.[0],lon:pts[0]?.[1],latLng:[ptsConverted[0][0],ptsConverted[0][1]],color:d.color,hex:COLORS[d.color]?.hex||'#007AFF',cmd:(d.cmd||d.comm||`Т${i+1}`).trim(),comm:d.comm||'',pts:ptsConverted,az:pts.length>=2?calcAzimuth(pts[0],pts[1]):0};
    }).filter(p=>p!==null);
    if(APP.navPoints.length===0)throw new Error('Нет валидных точек');
    APP.navCurrentIndex=0;APP.navPreviewIndex=-1;
    $('hud').classList.add('active');$('telemetryPanel').classList.add('visible');$('jsonModal').classList.add('hidden');$('loading').classList.add('hidden');
    renderRoutePoints();updateHud();
    if(APP.navPoints.length>0&&APP.map)setTimeout(()=>{
        let minLat=Infinity,maxLat=-Infinity,minLng=Infinity,maxLng=-Infinity;
        APP.navPoints.forEach(p=>{if(p.pts?.length>0){const[lng,lat]=p.pts[0];minLat=Math.min(minLat,lat);maxLat=Math.max(minLat,maxLat);minLng=Math.min(minLng,lng);maxLng=Math.max(minLng,maxLng);}});
        if(minLat!==Infinity)APP.map.update({location:{center:[(minLng+maxLng)/2,(minLat+maxLat)/2],zoom:14}});
    },100);
    preloadAudio();
    let routeName=name;const searchParam=new URLSearchParams(window.location.search).get('m');
    if(searchParam)routeName=searchParam;else{const hash=window.location.hash.slice(1);if(hash){const hashParam=new URLSearchParams(hash).get('m');if(hashParam)routeName=hashParam;}}
}

// ============================================
// WAKE LOCK
// ============================================
let wakeLockInterval=null;const wakeVideo=document.getElementById('wakeLockVideo');let wakeCanvas=null,wakeCanvasStream=null;

function initWakeVideo(){
    if(!wakeCanvas){wakeCanvas=document.createElement('canvas');wakeCanvas.width=1;wakeCanvas.height=1;const ctx=wakeCanvas.getContext('2d');ctx.fillStyle='#000';ctx.fillRect(0,0,1,1);if(wakeCanvas.captureStream)wakeCanvasStream=wakeCanvas.captureStream(30);else if(wakeCanvas.mozCaptureStream)wakeCanvasStream=wakeCanvas.mozCaptureStream(30);}
}

function initAudioContext(){
    if(typeof AudioContext!=='undefined'){const audioCtx=new(window.AudioContext||window.webkitAudioContext)(),oscillator=audioCtx.createOscillator(),gainNode=audioCtx.createGain();gainNode.gain.value=0;oscillator.connect(gainNode);gainNode.connect(audioCtx.destination);oscillator.start();setTimeout(()=>oscillator.stop(),100);return audioCtx;}
    return null;
}

function startWakeLock(){
    initWakeVideo();if(wakeVideo&&wakeCanvasStream){wakeVideo.srcObject=wakeCanvasStream;wakeVideo.play().catch(e=>console.log('Wake video error:',e));}
    const audioCtx=initAudioContext();if('vibrate' in navigator)navigator.vibrate(0);
    if(wakeLockInterval)clearInterval(wakeLockInterval);
    wakeLockInterval=setInterval(()=>{
        if(wakeVideo&&wakeVideo.paused)wakeVideo.play().catch(e=>console.log('Wake video restart error:',e));
        if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
        if(wakeCanvas){const ctx=wakeCanvas.getContext('2d');ctx.fillStyle='#'+Math.floor(Math.random()*16777215).toString(16);ctx.fillRect(0,0,1,1);}
    },3000);
}

function stopWakeLock(){if(wakeLockInterval){clearInterval(wakeLockInterval);wakeLockInterval=null;}if(wakeVideo){wakeVideo.pause();wakeVideo.srcObject=null;}}
document.addEventListener('DOMContentLoaded',()=>setTimeout(startWakeLock,500));

    ymaps3.import.registerCdn('https://cdn.jsdelivr.net/npm/{package}','@yandex/ymaps3-default-ui-theme@latest');

    const isMobile=/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)||('ontouchstart'in window);
    
    // Для мобильных добавляем поворот двумя пальцами
    const behaviors=isMobile?
        ['drag','scrollZoom','dblClick','mouseTilt','mouseRotate','pinchZoom','pinchRotate']:
        ['drag','scrollZoom','dblClick','mouseTilt','mouseRotate','pinchZoom'];
    
    APP.map=new YMap(document.getElementById('map'),{location:{center:[43.9332,56.3399],zoom:17,tilt:0},behaviors},[new YMapDefaultSchemeLayer({}),new YMapDefaultFeaturesLayer({})]);

    userMarkerEl.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40"><g id="user-arrow"><path d="M20,4 L32,34 L20,28 L8,34 Z" fill="#F33" stroke="white" stroke-width="2"/></g></svg>`;
    APP.userMarker=new ymaps3.YMapMarker({coordinates:[43.9332,56.3399],zIndex:5000},userMarkerEl);APP.userMarkerEl=userMarkerEl;APP.map.addChild(APP.userMarker);
    initGeolocation();AutoRouteModule.init($('autoRouteBtn'));
    
    // Переключение наклона карты по клику на спидометр (0° ↔ 50°)
    let currentTilt=0;
    const modeIndicator=$('modeIndicator');
    $('telemetryPanel').addEventListener('click',()=>{
        currentTilt=currentTilt===0?50:0;
        modeIndicator.textContent=currentTilt===0?'2D':'3D';
        if(APP.map){
            APP.map.update({camera:{tilt:currentTilt*(Math.PI/180),duration:300}});

    $('listBtn').addEventListener('click',togglePointsList);$('locateBtn').addEventListener('click',toggleAutoCenter);

    document.getElementById('map').addEventListener('click',(e)=>{if(!e.target.closest('.ymaps3-controls')){closePreview();$('pointsList').style.display='none';}});
    MenuModule.init(loadRouteFromJSON);$('loading').classList.add('hidden');
}

initMap();
